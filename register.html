<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Parent Account | SwimPro Academy</title>
  <link rel="icon" type="image/gif" href="https://cdnl.iconscout.com/lottie/premium/thumb/swimming-animation-gif-download-7973737.gif">
  
  <!-- Bootstrap 5 CDN -->
  <link id="bootstrap-link" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  
  <!-- Custom Stylesheets -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body class="bg-light-gray d-flex flex-column min-vh-100 justify-content-center py-5">

  <!-- Top-Right Toggles -->
  <div class="position-absolute top-0 end-0 p-3 d-flex gap-2 z-3">
    <button id="theme-toggle" class="toggle-btn text-dark border-secondary border-opacity-25" style="border: 1px solid;" aria-label="Toggle Theme">
      <i class="bi bi-moon-fill"></i>
    </button>
    <button id="rtl-toggle" class="toggle-btn text-dark border-secondary border-opacity-25" style="border: 1px solid;" aria-label="Toggle Layout Direction">
      <span>RTL</span>
    </button>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-6">
        <div class="card p-4 p-md-5 border-0 shadow-lg text-center bg-white">
          
          <!-- Logo -->
          <div class="mb-4">
            <a href="index.html" class="logo-container justify-content-center">
              <img src="https://cdnl.iconscout.com/lottie/premium/thumb/swimming-animation-gif-download-7973737.gif" alt="SwimPro Logo" class="logo-image">
              <span class="logo-text">SWIMPRO</span>
            </a>
          </div>

          <h2 class="h4 font-serif text-dark mb-4">Register Parent Account</h2>
          
          <form id="register-form" class="needs-validation" novalidate onsubmit="event.preventDefault(); if(this.checkValidity()){ alert('Account registered successfully! Redirecting to login.'); window.location.href='login.html'; }">
            
            <div class="mb-3 text-start">
              <label for="regFirst" class="form-label">First Name</label>
              <input type="text" class="form-control" id="regFirst" placeholder="Enter first name" required>
              <div class="invalid-feedback">Required.</div>
            </div>
            
            <div class="mb-3 text-start">
              <label for="regLast" class="form-label">Last Name</label>
              <input type="text" class="form-control" id="regLast" placeholder="Enter last name" required>
              <div class="invalid-feedback">Required.</div>
            </div>
            
            <div class="mb-3 text-start">
              <label for="regEmail" class="form-label">Email Address</label>
              <input type="email" class="form-control" id="regEmail" placeholder="name@domain.com" required>
              <div class="invalid-feedback">Valid email required.</div>
            </div>

            <div class="mb-3 text-start">
              <label for="regPassword" class="form-label">Password</label>
              <div class="input-group">
                <input type="password" class="form-control" id="regPassword" placeholder="Create password" required>
                <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordVisibility('regPassword', 'regPassIcon')">
                  <i class="bi bi-eye" id="regPassIcon"></i>
                </button>
              </div>
            </div>
            
            <div class="mb-4 text-start">
              <label for="regConfirm" class="form-label">Confirm Password</label>
              <div class="input-group">
                <input type="password" class="form-control" id="regConfirm" placeholder="Confirm password" required>
                <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordVisibility('regConfirm', 'regConfIcon')">
                  <i class="bi bi-eye" id="regConfIcon"></i>
                </button>
              </div>
            </div>

            <hr class="my-4">

            <!-- Multiple Children Support Fields -->
            <div class="text-start mb-4">
              <h5 class="font-serif text-info h6 mb-3"><i class="bi bi-people-fill me-2"></i>Swimmers (Children Information)</h5>
              <div id="children-container">
                <div class="row g-2 mb-2 child-row">
                  <div class="col-7">
                    <input type="text" class="form-control form-control-sm" placeholder="Child's Full Name" required>
                  </div>
                  <div class="col-3">
                    <input type="number" class="form-control form-control-sm" placeholder="Age" min="3" max="17" required>
                  </div>
                  <div class="col-2">
                    <button type="button" class="btn btn-sm btn-outline-danger w-100" onclick="this.closest('.child-row').remove()"><i class="bi bi-trash"></i></button>
                  </div>
                </div>
              </div>
              <button type="button" class="btn btn-sm btn-outline-secondary mt-2" onclick="addChildRow()"><i class="bi bi-plus-circle me-1"></i> Add Another Child</button>
            </div>

            <div class="form-check text-start mb-4">
              <input type="checkbox" class="form-check-input" id="termsCheck" required>
              <label class="form-check-label text-muted small" for="termsCheck">I agree to the terms, conditions, and safety waivers.</label>
            </div>

            <button type="submit" class="btn btn-custom-primary w-100 py-3 mb-3">Create Account</button>
          </form>

          <p class="text-muted small mb-0 mt-4">Already have an account? <a href="login.html" class="text-info text-decoration-none">Sign In</a></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    function addChildRow() {
      const container = document.getElementById('children-container');
      const row = document.createElement('div');
      row.className = 'row g-2 mb-2 child-row';
      row.innerHTML = `
        <div class="col-7">
          <input type="text" class="form-control form-control-sm" placeholder="Child's Full Name" required>
        </div>
        <div class="col-3">
          <input type="number" class="form-control form-control-sm" placeholder="Age" min="3" max="17" required>
        </div>
        <div class="col-2">
          <button type="button" class="btn btn-sm btn-outline-danger w-100" onclick="this.closest('.child-row').remove()"><i class="bi bi-trash"></i></button>
        </div>
      `;
      container.appendChild(row);
    }

    function togglePasswordVisibility(fieldId, iconId) {
      const passField = document.getElementById(fieldId);
      const icon = document.getElementById(iconId);
      if (passField.type === 'password') {
        passField.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        passField.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }
  </script>

  <!-- Bootstrap 5 JavaScript Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JavaScript -->
  <script src="assets/js/main.js"></script>
</body>
</html>
