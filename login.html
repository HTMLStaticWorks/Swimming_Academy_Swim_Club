<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Login | SwimPro Academy</title>
  <link rel="icon" type="image/gif" href="https://cdnl.iconscout.com/lottie/premium/thumb/swimming-animation-gif-download-7973737.gif">
  
  <!-- Bootstrap 5 CDN -->
  <link id="bootstrap-link" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  
  <!-- Custom Stylesheets -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body class="bg-light-gray d-flex flex-column min-vh-100 justify-content-center py-5">

  <!-- Top-Right Toggles (As per Rules.md, no global header/footer) -->
  <div class="position-absolute top-0 end-0 p-3 d-flex gap-2 z-3">
    <button id="theme-toggle" class="toggle-btn text-dark border-secondary border-opacity-25" style="border: 1px solid;" aria-label="Toggle Theme">
      <i class="bi bi-moon-fill"></i>
    </button>
    <button id="rtl-toggle" class="toggle-btn text-dark border-secondary border-opacity-25" style="border: 1px solid;" aria-label="Toggle Layout Direction">
      <span>RTL</span>
    </button>
  </div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="card p-4 p-md-5 border-0 shadow-lg text-center bg-white">
          
          <!-- Logo -->
          <div class="mb-4">
            <a href="index.html" class="logo-container justify-content-center">
              <img src="https://cdnl.iconscout.com/lottie/premium/thumb/swimming-animation-gif-download-7973737.gif" alt="SwimPro Logo" class="logo-image">
              <span class="logo-text">SWIMPRO</span>
            </a>
          </div>

          <h2 class="h4 font-serif text-dark mb-4">Log In to Portal</h2>
          
          <form id="login-form" class="needs-validation" novalidate>
            <!-- User Role Select -->
            <div class="mb-3 text-start">
              <label for="userRole" class="form-label">Select Portal Role</label>
              <select id="userRole" class="form-select" required>
                <option value="parent">Parent Portal</option>
                <option value="coach">Coach Portal</option>
                <option value="admin">Administrator Portal</option>
              </select>
            </div>
            
            <div class="mb-3 text-start">
              <label for="loginEmail" class="form-label">Email Address</label>
              <input type="email" class="form-control" id="loginEmail" placeholder="name@domain.com" required>
              <div class="invalid-feedback">Please enter a valid email.</div>
            </div>
            
            <div class="mb-3 text-start">
              <label for="loginPassword" class="form-label">Password</label>
              <div class="input-group">
                <input type="password" class="form-control" id="loginPassword" placeholder="Enter password" required>
                <button class="btn btn-outline-secondary" type="button" id="password-toggle" onclick="togglePasswordVisibility()">
                  <i class="bi bi-eye" id="password-toggle-icon"></i>
                </button>
              </div>
              <div class="invalid-feedback">Password is required.</div>
            </div>

            <!-- Remember & Forgot on same line -->
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label text-muted small" for="rememberMe">Remember me</label>
              </div>
              <a href="#" class="text-info small text-decoration-none" onclick="alert('OTP has been sent to your registered email/phone.')">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-custom-primary w-100 py-3 mb-3">Sign In</button>
          </form>

          <!-- Social Logins -->
          <div class="text-center my-3">
            <span class="text-muted small">Or Sign In With</span>
            <div class="d-flex justify-content-center gap-3 mt-2">
              <button class="btn btn-outline-secondary px-3 py-2 rounded" onclick="alert('Signing in with Google...')"><i class="bi bi-google"></i> Google</button>
              <button class="btn btn-outline-secondary px-3 py-2 rounded" onclick="alert('Signing in with Apple...')"><i class="bi bi-apple"></i> Apple</button>
            </div>
          </div>

          <p class="text-muted small mb-0 mt-4">Don't have a parent account? <a href="register.html" class="text-info text-decoration-none">Create Account</a></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Password visibility toggle
    function togglePasswordVisibility() {
      const passField = document.getElementById('loginPassword');
      const icon = document.getElementById('password-toggle-icon');
      if (passField.type === 'password') {
        passField.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        passField.type = 'password';
        icon.className = 'bi bi-eye';
      }
    }

    // Handle redirection based on portal selection
    document.getElementById('login-form').addEventListener('submit', function(e) {
      if (this.checkValidity()) {
        e.preventDefault();
        const role = document.getElementById('userRole').value;
        if (role === 'parent') {
          window.location.href = 'parent-dashboard.html';
        } else if (role === 'coach') {
          window.location.href = 'coach-dashboard.html';
        } else if (role === 'admin') {
          window.location.href = 'admin-dashboard.html';
        }
      }
    });
  </script>

  <!-- Bootstrap 5 JavaScript Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Custom JavaScript -->
  <script src="assets/js/main.js"></script>
</body>
</html>
